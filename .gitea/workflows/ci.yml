name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    # Pinned to the toolchain this project actually needs: Elixir 1.15+ on OTP 25
    # (apt's Elixir 1.14 is too old for current Hex deps). The official image
    # bundles full OTP, so mint's public_key/ssl shims compile out of the box.
    container:
      image: elixir:1.17.3-otp-25

    env:
      MIX_ENV: test

    steps:
      # Everything below runs *inside* the elixir container:
      #  - JS-based actions (checkout, cache) need Node.js, which the image lacks.
      #  - git is needed for the heroicons GitHub dep.
      #  - Postgres runs locally on localhost to avoid Gitea service-container DNS
      #    (a service named `postgres` doesn't resolve from this job container).
      - name: Install system deps (Node.js, git, PostgreSQL)
        run: |
          apt-get update
          apt-get install -y --no-install-recommends ca-certificates curl gnupg git postgresql
          curl -fsSL https://deb.nodesource.com/setup_20.x | bash -
          apt-get install -y --no-install-recommends nodejs

      - name: Start PostgreSQL (localhost, trust auth)
        run: |
          PGVER=$(ls /etc/postgresql)
          HBA=/etc/postgresql/$PGVER/main/pg_hba.conf
          # Trust local connections — this is a throwaway CI database, and it
          # makes the postgres/postgres credentials in config/test.exs irrelevant.
          printf 'local all all trust\nhost all all 127.0.0.1/32 trust\nhost all all ::1/128 trust\n' > "$HBA"
          pg_ctlcluster "$PGVER" main restart
          for i in $(seq 1 30); do pg_isready -h localhost -U postgres && break; sleep 1; done

      - uses: actions/checkout@v4

      - name: Install hex + rebar
        run: |
          mix local.hex --force
          mix local.rebar --force

      - name: Cache deps and build
        uses: actions/cache@v4
        with:
          path: |
            deps
            _build
          key: ${{ runner.os }}-mix-${{ hashFiles('mix.lock') }}
          restore-keys: ${{ runner.os }}-mix-

      - name: Fetch dependencies
        run: mix deps.get

      - name: Check formatting
        run: mix format --check-formatted

      - name: Compile (warnings as errors)
        run: mix compile --warnings-as-errors

      - name: Run tests
        run: mix test
