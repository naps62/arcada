name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    # Pinned to the toolchain this project actually needs: Elixir 1.15+ on OTP 25
    # (apt's Elixir 1.14 is too old for current Hex deps). The official image
    # bundles full OTP, so mint's public_key/ssl shims compile out of the box.
    container:
      image: elixir:1.17.3-otp-25

    env:
      MIX_ENV: test
      # The runner uses host networking, so localhost:5432 collides with the
      # gitea host's own Postgres. Run our throwaway CI DB on 5433 instead.
      DATABASE_PORT: "5433"

    steps:
      # Everything below runs *inside* the elixir container:
      #  - JS-based actions (checkout, cache) need Node.js, which the image lacks.
      #  - git is needed for the heroicons GitHub dep.
      #  - Postgres runs locally on localhost to avoid Gitea service-container DNS
      #    (a service named `postgres` doesn't resolve from this job container).
      - name: Install system deps (Node.js, git, PostgreSQL)
        run: |
          apt-get update
          apt-get install -y --no-install-recommends ca-certificates curl gnupg git postgresql
          # Node.js 20 from the NodeSource apt repo via a pinned keyring — no
          # `curl | bash` (don't pipe a remote script into a root shell). The key
          # is fetched once and every nodejs package is signature-verified against
          # it, so a compromised/unavailable setup script can't run arbitrary code.
          curl -fsSL https://deb.nodesource.com/gpgkey/nodesource-repo.gpg.key \
            | gpg --dearmor -o /usr/share/keyrings/nodesource.gpg
          echo "deb [signed-by=/usr/share/keyrings/nodesource.gpg] https://deb.nodesource.com/node_20.x nodistro main" \
            > /etc/apt/sources.list.d/nodesource.list
          apt-get update
          apt-get install -y --no-install-recommends nodejs

      - name: Start PostgreSQL (localhost:5433, trust auth)
        run: |
          PGVER=$(ls /etc/postgresql)
          CONF=/etc/postgresql/$PGVER/main
          # Trust local connections (throwaway CI DB) and move off 5432, which
          # the gitea host already occupies under the runner's host networking.
          printf 'local all all trust\nhost all all 127.0.0.1/32 trust\nhost all all ::1/128 trust\n' > "$CONF/pg_hba.conf"
          printf "\nport = 5433\nlisten_addresses = 'localhost'\n" >> "$CONF/postgresql.conf"
          pg_ctlcluster "$PGVER" main restart
          for i in $(seq 1 30); do pg_isready -h localhost -p 5433 -U postgres && break; sleep 1; done
          pg_isready -h localhost -p 5433 -U postgres

      - uses: actions/checkout@v4

      - name: Install hex + rebar
        run: |
          mix local.hex --force
          mix local.rebar --force

      - name: Cache deps and build
        uses: actions/cache@v4
        with:
          path: |
            deps
            _build
          key: ${{ runner.os }}-mix-${{ hashFiles('mix.lock') }}
          restore-keys: ${{ runner.os }}-mix-

      - name: Fetch dependencies
        run: mix deps.get

      - name: Check formatting
        run: mix format --check-formatted

      - name: Compile (warnings as errors)
        run: mix compile --warnings-as-errors

      - name: Run tests
        run: mix test
