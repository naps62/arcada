name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    # Pinned to the toolchain this project actually needs: Elixir 1.15+ on OTP 25
    # (apt's Elixir 1.14 is too old for current Hex deps). The official image
    # bundles full OTP, so mint's public_key/ssl shims compile out of the box.
    container:
      image: elixir:1.17.3-otp-25

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      MIX_ENV: test
      DATABASE_HOST: postgres
      DATABASE_USER: postgres
      DATABASE_PASS: postgres

    steps:
      # JS-based actions (checkout, cache) run *inside* this container, which has
      # no Node.js — install it (and git, for the heroicons GitHub dep) first, via
      # bash, before any action that needs node. Runs before checkout on purpose.
      - name: Install Node.js + git
        run: |
          apt-get update
          apt-get install -y --no-install-recommends ca-certificates curl gnupg git
          curl -fsSL https://deb.nodesource.com/setup_20.x | bash -
          apt-get install -y --no-install-recommends nodejs

      - uses: actions/checkout@v4

      - name: Install hex + rebar
        run: |
          mix local.hex --force
          mix local.rebar --force

      - name: Cache deps and build
        uses: actions/cache@v4
        with:
          path: |
            deps
            _build
          key: ${{ runner.os }}-mix-${{ hashFiles('mix.lock') }}
          restore-keys: ${{ runner.os }}-mix-

      - name: Fetch dependencies
        run: mix deps.get

      - name: Check formatting
        run: mix format --check-formatted

      - name: Compile (warnings as errors)
        run: mix compile --warnings-as-errors

      - name: Run tests
        run: mix test
